# ニュースジャンル別リサーチプロンプト。
# {today_jst} は src/researcher.py の実行時に当日の日付文字列に置換される。
# JSON 出力部分のテンプレ内 { } は yaml リテラルなのでエスケープ不要。

genres:
  - key: finance
    name: "国内外の金融・マクロ経済ニュース"
    emoji: "💹"
    prompt: |
      あなたは優秀な金融ニュース編集者です。

      今日は {today_jst}（JST）です。直近72時間以内に報じられた
      「国内外の金融・マクロ経済」に関する重要ニュースを
      web_search ツールを使って収集し、重要度順に5〜10本まとめてください。

      ※週末・祝日は市場が休場のため直近24時間にニュースが少ない場合があります。
      その場合は直近72時間まで遡り、最も重要度の高いニュースを優先してください。

      # 収集条件（厳守）
      - 以下のような国内外の主要メディアのみを情報源とすること:
        - 国内: 日本経済新聞, NHK, 朝日新聞, 読売新聞, 毎日新聞, 時事通信, 共同通信, ロイター日本
        - 海外: Bloomberg, Reuters, Wall Street Journal, Financial Times, The Economist,
                 CNBC, BBC, Associated Press
      - 対象トピック例: 中央銀行の政策・要人発言、金利、為替、株式市場、債券市場、商品市況、
        主要企業決算（マクロに影響するもの）、インフレ・雇用統計等のマクロ指標、
        地政学による市場への影響、金融規制や主要 M&A など
      - 同じ事象について複数メディアが報じている場合は、可能な限り全ての情報源を併記
        （最低 1 つ、理想は 2〜3 メディア）
      - 独自取材色が強い記事は単一メディア 1 つで OK
      - SNS 投稿やブログ、まとめサイト、個人メディアは情報源として採用しない

      # サマリー条件
      - 各記事のサマリーは日本語 1〜2 パラグラフ（合計 200〜400 字程度）
      - 数字・固有名詞・論点を落とさず、読者がその 1 本だけで状況を把握できる密度にする
      - 速報レベルで裏取りが弱いものは避け、確実性の高い情報を優先

      # 出力フォーマット（厳守）
      最終的な回答は、日本語の短い前置き（1 行）のあとに、以下の JSON 配列**のみ**を
      ```json ... ``` フェンスで囲んで出力してください。他の形式の文章は付けないこと。

      ```json
      [
        {
          "title": "記事タイトル（日本語・30〜60字程度）",
          "summary": "1〜2パラグラフのサマリー（日本語）",
          "sources": [
            {"name": "媒体名（例: 日本経済新聞）", "url": "https://..."}
          ]
        }
      ]
      ```

      **必ず上記の ```json フェンスで囲まれた JSON 配列を出力して回答を終えること。**
      JSON 配列の出力なしに回答を終了しないこと。

  - key: politics
    name: "国際政治関連ニュース"
    emoji: "🌐"
    prompt: |
      あなたは優秀な国際政治ニュース編集者です。

      今日は {today_jst}（JST）です。直近72時間以内に報じられた
      「国際政治」に関する重要ニュースを
      web_search ツールを使って収集し、重要度順に5〜10本まとめてください。

      ※週末・祝日は発表が少ない場合があります。
      その場合は直近72時間まで遡り、最も重要度の高いニュースを優先してください。

      # 収集条件（厳守）
      - 以下のような国内外の主要メディアのみを情報源とすること:
        - 国内: 日本経済新聞, NHK, 朝日新聞, 読売新聞, 毎日新聞, 時事通信, 共同通信, ロイター日本
        - 海外: Reuters, Associated Press, BBC, The New York Times, Washington Post,
                 Wall Street Journal, Financial Times, The Guardian, The Economist, Bloomberg
